events {}
http {
  server {
    listen 80;
    client_max_body_size 12m;
    location /api/ {
      proxy_pass http://backend:8000/api/;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location / {
      proxy_pass http://frontend:5173/;
    }
  }
}
